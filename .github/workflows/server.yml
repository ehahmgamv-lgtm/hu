name: Build Cloudflared
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - run: git clone https://github.com/cloudflare/cloudflared.git

      - run: cp hello.go cloudflared/hello/hello.go

      - run: |
          cd cloudflared
          GOOS=linux GOARCH=arm64 make cloudflared
          mv cloudflared ../cloudflared-linux-arm64

      - run: chmod +x ./cloudflared-linux-arm64

      - run: |
          sudo sysctl -w net.core.rmem_max=7340032
          mkdir -p $HOME/.cloudflared; rm -f $HOME/.cloudflared/*.json; echo '' | base64 -d > $HOME/.cloudflared/cert.pem; ./cloudflared-linux-arm64 tunnel delete -f lscf-tunnel 2>/dev/null || true; ./cloudflared-linux-arm64 tunnel create lscf-tunnel; CREDS=$(ls $HOME/.cloudflared/*.json | head -n 1); TUNNEL_ID=$(basename "$CREDS" .json); printf "tunnel: %s\ncredentials-file: %s\ningress:\n  - hostname: lscf.eu.cc\n    service: hello_world\n  - service: http_status:404\n" "$TUNNEL_ID" "$CREDS" > $HOME/.cloudflared/config.yml; ./cloudflared-linux-arm64 tunnel route dns -f lscf-tunnel lscf.eu.cc; ./cloudflared-linux-arm64 tunnel run --config $HOME/.cloudflared/config.yml lscf-tunnel
          ./cloudflared-linux-arm64 tunnel run lscf-tunnel
